# Run without Postgres:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# In-memory H2. product-service still has to be running for POST /orders to work.
spring:
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
