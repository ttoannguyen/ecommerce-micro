services:
  postgres-product:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  product-service:
    build: ./product-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-product
      DB_PORT: 5432
    depends_on:
      postgres-product:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-order
      DB_PORT: 5432
      PRODUCT_SERVICE_URL: http://product-service:8081
    depends_on:
      postgres-order:
        condition: service_healthy
      product-service:
        condition: service_started
